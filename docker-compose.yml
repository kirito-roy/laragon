services:
  # This service runs once to generate Nginx configs and SSL certs.
  setup:
    build:
      context: .
      dockerfile: Dockerfile.setup
    container_name: laragon-setup
    volumes:
      # Mount the sites list, and the output directories for configs and certs
      - ./sites.txt:/app/sites.txt
      - ./nginx/sites-enabled:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      # Mount the CA directory to persist the root certificate
      - ./mkcert-ca:/root/.local/share/mkcert
      # Mount the script itself so changes are reflected without rebuilding
      - ./auto-setup.sh:/usr/local/bin/auto-setup.sh
    networks:
      - laravel_network

  nginx:
    image: nginx:alpine
    container_name: laragon-multi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./projects/ees:/var/www/html/ees
      - ./projects/upms:/var/www/html/upms
      # - ./projects/emms:/var/www/html/emms
      # - ./projects/jobAttendance:/var/www/html/jobAttendance
      # - ./projects/service-desk:/var/www/html/service-desk
      # - ./projects/laravel-project:/var/www/html/laravel-project
      # - ./projects/paw-backend:/var/www/html/paw-backend
      

      - ./nginx/sites-enabled:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      # This service will wait for the 'setup' service to complete successfully.
    depends_on:
      setup:
        condition: service_completed_successfully
    networks:
      - laravel_network

  php-82:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: php-82
    volumes:
      - ./projects/ees:/var/www/html/ees
      - ./projects/upms:/var/www/html/upms
    networks:
      - laravel_network
  # php-84:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.php-84
  #   container_name: php-84
  #   volumes:
  #     # - ./projects/laravel-project:/var/www/html/laravel-project
  #     - ./projects/paw-backend:/var/www/html/paw-backend
  #     # - ./projects/shhh-backend:/var/www/html/shhh-backend
  #     # - ./projects/emms:/var/www/html/emms
  #     # - ./projects/service-desk:/var/www/html/service-desk
  #     # - ./projects/jobAttendance:/var/www/html/jobAttendance
  #   networks:
  #     - laravel_network
  #   ports:
  #     - 8000:8000

  # The PostgreSQL database service.
  postgres:
    image:  postgis/postgis:17-master #wodby/postgres:$POSTGRES_TAG
    container_name: laragon-postgres
    shm_size: 2gb
    command: ["postgres", "-c", "log_statement=all", "-c", "log_destination=stderr"]
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d # Place init file(s) here.
    networks:
      - laravel_network
    ports:
      - "5432:5432"

  # The MySQL database service.
  # mysql:
