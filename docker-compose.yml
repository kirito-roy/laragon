services:
  # The Nginx service to serve your Laravel project.
  nginx:
    image: nginx:alpine
    container_name: laragon-multi-nginx
    ports:
      - "80:80"
    volumes:
      - ./ees:/var/www/html/ees
      - ./emms:/var/www/html/emms
      - ./service-desk:/var/www/html/service-desk
      
      - ./nginx/sites-enabled:/etc/nginx/conf.d
    depends_on:
      - postgres
      # - eems-php
    networks:
      - laravel_network

  # PHP-FPM service for the 'ees' project.
  php-82:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: php-82
    volumes:
      - ./ees:/var/www/html/ees
    networks:
      - laravel_network
    depends_on:
      - nginx
  php-84:
    build:
      context: .
      dockerfile: Dockerfile.php-84
    container_name: php-84
    volumes:
      - ./emms:/var/www/html/emms
      - ./service-desk:/var/www/html/service-desk
    networks:
      - laravel_network
    depends_on:
      - nginx
    ports:
      - 8000:8000

  # PHP-FPM service for the 'emms' project.
  # emms-php:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.php
  #   container_name: emms-php
  #   volumes:
  #     - ./emms:/var/www/html/emms
  #   networks:
  #     - laravel_network
  
  # # PHP-FPM service for the 'eems' project.
  # eems-php:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.php
  #   container_name: eems-php
  #   volumes:
  #     - ./eems:/var/www/html/eems
  #   networks:
  #     - laravel_network

  # The PostgreSQL database service.
  postgres:
    image:  postgis/postgis:15-master #wodby/postgres:$POSTGRES_TAG
    container_name: laragon-postgres
    command: ["postgres", "-c", "log_statement=all", "-c", "log_destination=stderr"]
    restart: always
    environment:
      POSTGRES_USER: ees
      POSTGRES_PASSWORD: root
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      # - ./postgres-init:/docker-entrypoint-initdb.d # Place init file(s) here.
    networks:
      - laravel_network
    ports:
      - "5432:5432"

  # The Redis service for caching and queues.
  redis:
    image: redis:alpine
    container_name: laragon-redis
    networks:
      - laravel_network
    ports:
      - "6379:6379"


  # The Node.js service for asset compilation.
  node:
    image: node:22-alpine
    container_name: node
    volumes: 
      - ./:/var/www/html
    working_dir: /var/www/html
    command: tail -f /dev/null
    # for php 8.4
    # cd to project
    #npm install && npm run dev -- --host 0.0.0.0
    networks:
      - laravel_network
    ports:
      - "5173:5173"

# Defines a custom network for all services
networks:
  laravel_network:
    driver: bridge

# Defines a volume for database data persistence
volumes:
  postgres_data:
    driver: local
